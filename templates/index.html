<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Tour One Day Trip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-primary: #111111;
            --text-secondary: #666666;
            --border-color: #e5e5e5;
            --accent-color: #222222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: 2.2rem; font-weight: 500; margin-bottom: 10px; }
        header p { color: var(--text-secondary); font-size: 1rem; font-weight: 300; }
        
        .trip-timeline {
            display: flex; flex-direction: column; gap: 40px; margin-bottom: 60px;
        }
        .place-card {
            display: grid; grid-template-columns: 1fr;
            background: #ffffff; border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        @media (min-width: 768px) { .place-card { grid-template-columns: 250px 1fr; } }
        .place-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .place-image { width: 100%; height: 200px; object-fit: cover; }
        @media (min-width: 768px) { .place-image { height: 100%; } }
        
        .place-content { padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .place-header h2 { font-size: 1.3rem; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .place-number { font-size: 0.9rem; color: var(--text-secondary); border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 20px; }
        .place-description { color: var(--text-secondary); font-size: 0.95rem; font-weight: 300; margin-bottom: 20px; }
        
        .btn-nav {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 20px; font-size: 0.85rem; color: var(--text-primary);
            background-color: transparent; border: 1px solid var(--text-primary);
            border-radius: 4px; text-decoration: none; cursor: pointer;
            transition: all 0.2s ease; align-self: flex-start;
        }
        .btn-nav:hover { background-color: var(--accent-color); color: #ffffff; }
        
        .map-section { margin-top: 60px; border-top: 1px solid var(--border-color); padding-top: 40px; }
        .map-section h3 { font-size: 1.5rem; font-weight: 500; margin-bottom: 20px; text-align: center; }
        .map-wrapper { border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        .explore-route-container { text-align: center; }
        .btn-explore {
            display: inline-flex; padding: 14px 32px; font-size: 0.95rem; font-weight: 500;
            color: #ffffff; background-color: var(--accent-color);
            border-radius: 4px; text-decoration: none; transition: background-color 0.2s ease;
        }
        .btn-explore:hover { background-color: #444444; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>One Day Mini Tour</h1>
            <p>บันทึกการเดินทาง 1 วัน พักผ่อนและลิ้มรสอาหารตามพิกัดหมุดหมาย</p>
        </header>

        <!-- ข้อมูลสถานที่ทั้งหมดจะถูกวนลูปแสดงตรงนี้ -->
        <div class="trip-timeline">
            {% for loc in locations %}
            <div class="place-card">
                <img src="{{ loc.image_url }}" alt="{{ loc.name }}" class="place-image">
                <div class="place-content">
                    <div class="place-header">
                        <h2><span class="place-number">0{{ loc.id }}</span>{{ loc.name }}</h2>
                        <p class="place-description">{{ loc.description }}</p>
                    </div>
                    <a href="https://www.google.com/maps/search/?api=1&query={{ loc.lat }},{{ loc.lng }}" target="_blank" class="btn-nav">
                        ข้อมูลเส้นทาง
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>

        <section class="map-section">
            <h3>Trip Map Route</h3>
            <div class="map-wrapper">
                <!-- แผนที่ Folium จะมาแทรกตรงนี้ -->
                {{ map_html|safe }}
            </div>
            <div class="explore-route-container">
                <a href="{{ google_maps_route }}" target="_blank" class="btn-explore">
                    Explore Route (Google Maps)
                </a>
            </div>
        </section>
    </div>

</body>
</html>

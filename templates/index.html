<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Tour Trip One Day</title>
    <!-- นำเข้าฟอนต์จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-muted: #666666;
            --border-color: #eaeaea;
        }

        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .locations-grid {
            display: flex;
            flex-direction: column;
            gap: 60px;
            margin-bottom: 80px;
        }

        .location-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        /* สลับฝั่งรูปและข้อความในแถวคู่เพื่อความสวยงาม */
        .location-card:nth-child(even) .card-image {
            order: 2;
        }
        .location-card:nth-child(even) .card-content {
            order: 1;
        }

        .card-image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .card-content h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .card-content p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .btn-route {
            display: inline-block;
            background-color: var(--text-main);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 2px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-route:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        .map-section {
            padding: 60px 0;
            background-color: #ffffff;
            border-top: 1px solid var(--border-color);
        }

        .map-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .map-container h2 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 40px;
        }

        /* ปรับแต่ง iframe ของ Folium */
        .folium-map-wrapper {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            height: 500px;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            background-color: #ffffff;
        }

        @media (max-width: 768px) {
            .location-card, .location-card:nth-child(even) {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .location-card:nth-child(even) .card-image {
                order: 1;
            }
            .location-card:nth-child(even) .card-content {
                order: 2;
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mini Tour Trip One Day</h1>
        <p>แผนการเดินทาง 1 วัน สไตล์มินิมอล (พิกัด: ภูเก็ต)</p>
    </header>

    <main class="container">
        <div class="locations-grid">
            {% for loc in locations %}
            <article class="location-card">
                <div class="card-image">
                    <img src="{{ loc.img_url }}" alt="{{ loc.name }}">
                </div>
                <div class="card-content">
                    <h2>0{{ loc.id }}. {{ loc.name }}</h2>
                    <p>{{ loc.description }}</p>
                    <a href="{{ loc.gmap_url }}" target="_blank" class="btn-route">ข้อมูลเส้นทาง</a>
                </div>
            </article>
            {% end endfor %}
        </div>
    </main>

    <!-- ส่วนแผนที่ Folium ด้านล่างสุด -->
    <section class="map-section">
        <div class="map-container">
            <h2>Route Map</h2>
            <div class="folium-map-wrapper">
                {{ map_html|safe }}
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Minimalist Tour Route. Designed with Flask & Folium.
    </footer>

</body>
</html>
